name: Genera indice storie

# Si attiva quando viene fatto push di file nella cartella stories/
on:
  push:
    paths:
      - 'stories/**.json'

jobs:
  aggiorna-indice:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessario per fare il commit automatico

    steps:
      - name: Scarica il repository
        uses: actions/checkout@v4

      - name: Esegui lo script Python
        run: python scripts/genera_indice.py

      - name: Commit e push di index.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stories/index.json
          # Committa solo se c'è qualcosa di cambiato
          git diff --staged --quiet || git commit -m "chore: aggiorna index.json automaticamente"
          git push